<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doação de sangue</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="a"></div>
    <div class="navbar">
        <h1 class="titulo">Doação de sangue</h1>
    </div>

    <div class="fundo_cadastro">
        <H1 class="titulo">Cadastro doação</H1>
        <h2>Preencha as informações no formulário</h4><br><br>

        <form id="formAdocao">
            <input type="text" id="nome" placeholder="Nome completo"><br><br>

            <input type="text" id="email" placeholder="Email"><br><br>

            <input type="text" id="telefone" placeholder="Telefone"><br><br>

            <input type="number" id="cpf" placeholder="cpf"><br><br>

            <input type="number" id="idade" placeholder="idade"><br><br>

            <input type="text" id="cidade" placeholder="cidade"><br><br>

            <input type="text" id="estado" placeholder="Estado"><br><br>

            <label>Qual seu tipo sanguineo:</label>
            <select  id="tipo" required>
                    <option value="A+">A+</option>
                    <option value="A-">A-</option>
                    <option value="O+">O+</option>
                    <option value="O-">O-</option>
                    <option value="B+">B+</option>
                    <option value="B-">B-</option>
                    <option value="AB+">AB+</option>
                    <option value="AB-">AB-</option>
            </select><br><br>

                <p>Qual melhor dia para doação:</p>
            <input type="date" id="data" required><br><br>ss

            <input type="text" id="doenca" placeholder="Tem alguma doença" required><br><br>

            <input type="checkbox" id="termo">
            <label for="termo">Aceito os termos</label><br>

            <button type="submit">Enviar</button>

        </form>
    </div> 

    <script src="script.js"></script>
</body>
</html>
